<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shree Sonawane | Executive Profile</title>
    <style>
        :root { --neon: #00ff66; --bg: #030107; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }

        /* Minimal Header */
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .title { font-size: 1.5rem; color: var(--neon); letter-spacing: 2px; text-transform: uppercase; }

        /* Dossier Box */
        .dossier { 
            max-width: 500px; 
            margin: 20px auto; 
            padding: 25px; 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            border-radius: 12px;
        }

        .data-item { margin-bottom: 20px; border-bottom: 1px solid #111; padding-bottom: 15px; }
        .label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
        .value { font-size: 0.95rem; font-weight: 500; color: #eee; }

        .image-container { max-width: 500px; margin: 0 auto 20px; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        img { width: 100%; display: block; }

        .footer { text-align: center; font-size: 0.7rem; color: #333; padding: 40px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="title">Founder Identity // Secure</div>
    </header>

    <div class="dossier">
        <!-- Photo Section -->
        <div class="image-container"><img src="myphoto.jpeg" alt="Profile"></div>

        <!-- Data Section -->
        <div class="data-item">
            <div class="label">Legal Identity</div>
            <div class="value">Shree Sanjay Sonawane</div>
        </div>
        <div class="data-item">
            <div class="label">Current Location</div>
            <div class="value">Nashik, Maharashtra</div>
        </div>
        <div class="data-item">
            <div class="label">Age Parameters</div>
            <div class="value">15 Years</div>
        </div>
        <div class="data-item">
            <div class="label">Academic Institution</div>
            <div class="value">St. Francis High School, Nashik</div>
        </div>
        <div class="data-item">
            <div class="label">Origin Coordinates</div>
            <div class="value">Bhusawal, Jalgaon</div>
        </div>
    </div>

    <footer class="footer">SKY MATRIX WORLD // PROPRIETARY</footer>

</body>
</html>
